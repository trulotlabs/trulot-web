name: TruLot Overlay Repair Production Migration (Frozen)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enforce-sda-recovery-freeze:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out dispatch commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Deny prohibited overlay workflow during SDA recovery
        shell: bash
        run: |
          set -euo pipefail
          node scripts/guard-production-database-freeze.mjs \
            --workflow-ref "${GITHUB_WORKFLOW_REF}" \
            --environment production \
            --operation database-push \
            --migration-dir supabase/migrations
